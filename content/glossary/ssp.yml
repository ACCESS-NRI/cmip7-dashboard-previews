term: SSP
expansion: Shared Socioeconomic Pathway
short: A storyline of future society and emissions used to drive climate projections.
long: >-
  SSPs describe different plausible futures for population, economic growth,
  technology and policy, each implying a different path for greenhouse-gas
  emissions. Pairing an SSP with a level of climate forcing (for example
  "SSP2-4.5") gives a scenario that models run forward to project a possible
  future climate — as opposed to the idealised or historical experiments that
  characterise how the model itself behaves.
aliases:
  - SSPs
  - scenario
