term: CMIP7
expansion: Coupled Model Intercomparison Project — Phase 7
short: The current phase of CMIP, and the set of experiments this dashboard tracks.
long: >-
  CMIP7 is the seventh phase of CMIP. It defines the current generation of shared
  experiments that modelling groups worldwide are running and publishing. This
  dashboard reports the progress and results of ACCESS — Australia's model,
  developed and run jointly by ACCESS-NRI and CSIRO.
links:
