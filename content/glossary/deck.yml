term: DECK
expansion: Diagnosis, Evaluation, and Characterization of Klima
short: The standard baseline set of experiments every CMIP model is expected to run.
long: >-
  The DECK (Diagnosis, Evaluation, and Characterization of Klima) is a small, fixed 
  set of core experiments — a pre-industrial control, a historical run, and a couple
  of idealised CO₂ experiments — that every model contributes in each phase of CMIP. 
  Keeping this entry set constant across models and across CMIP generations is what 
  makes results comparable over time. ("Klima" is simply the Greek-rooted word for 
  climate.)
links:
